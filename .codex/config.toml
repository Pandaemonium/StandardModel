model = "gpt-5.5"
model_provider = "openai"

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
include_only = [
    "ALLUSERSPROFILE",
    "APPDATA",
    "COMSPEC",
    "HOME",
    "HOMEDRIVE",
    "HOMEPATH",
    "LOCALAPPDATA",
    "NUMBER_OF_PROCESSORS",
    "OS",
    "PATH",
    "PATHEXT",
    "PROCESSOR_ARCHITECTURE",
    "PROCESSOR_IDENTIFIER",
    "PSMODULEPATH",
    "SYSTEMROOT",
    "TEMP",
    "TMP",
    "USERDOMAIN",
    "USERNAME",
    "USERPROFILE",
    "WINDIR",
    "PYTHONIOENCODING",
    "ANTHROPIC_API_KEY",
    "ANTHROPIC_AUTH_TOKEN",
    "ARISTOTLE_API_KEY",
    "GEMINI_API_KEY",
    "GOOGLE_API_KEY",
    "GOOGLE_APPLICATION_CREDENTIALS",
    "OPENAI_API_KEY",
    "NEO4J_URI",
    "NEO4J_USERNAME",
    "NEO4J_PASSWORD",
    "NEO4J_DATABASE",
    "OPENALEX_API_KEY",
    "SEMANTIC_SCHOLAR_API_KEY",
    "UNPAYWALL_EMAIL",
    "ZOTERO_API_KEY",
]

[features]
multi_agent = true

[agents]
max_threads = 8
max_depth = 1
job_max_runtime_seconds = 3600

[mcp_servers.local-qwen]
command = "python"
args = ["c:/Projects/StandardModel/Scripts/oracle/local_mcp_bridge.py"]

[mcp_servers.neo4j_graph]
command = "cmd.exe"
args = [
    "/c",
    'C:\Projects\AutoLab\COGLab\infrastructure\mcp\neo4j_mcp\run.bat',
]
env_vars = [
    "NEO4J_URI",
    "NEO4J_USERNAME",
    "NEO4J_PASSWORD",
    "NEO4J_DATABASE",
]

[mcp_servers.neo4j_graph.env]
NEO4J_READ_ONLY = "false"
NEO4J_TELEMETRY = "false"

[mcp_servers.scholarly]
command = "python"
args = ["C:/Projects/AutoLab/COGLab/infrastructure/mcp/scholarly_wrapper/src/server.py"]
env_vars = [
    "OPENALEX_API_KEY",
    "SEMANTIC_SCHOLAR_API_KEY",
    "UNPAYWALL_EMAIL",
]

[mcp_servers.zotero_write]
command = "python"
args = ["C:/Tools/mcp/zotero-writer/src/server.py"]
env_vars = ["ZOTERO_API_KEY"]

[mcp_servers.zotero_write.env]
ZOTERO_USER_ID = "19894138"
ZOTERO_LIBRARY_TYPE = "user"
