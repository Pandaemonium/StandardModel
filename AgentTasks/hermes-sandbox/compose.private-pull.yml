services:
  ollama:
    networks:
      - hermes-private
      - hermes-egress

  model-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    command:
      - pull
      - ${HERMES_MODEL:-mannix/hermes-3-llama-3.1-8b:Q4_K_M}
    networks:
      - hermes-private

networks:
  hermes-egress:
