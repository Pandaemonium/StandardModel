name = "PhysicsSM"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["PhysicsSM"]

# Toolchain is pinned to v4.28.0 for compatibility with:
#   - Aristotle (harmonic.fun proof agent)
#   - math-inc/Sphere-Packing-Lean / the local Windows-safe SPL fork
# Do not upgrade the toolchain unless mathlib, SpherePacking, and the
# Aristotle workflow all build cleanly under the target version.
#
# NOTE — SpherePacking Windows incompatibility:
#   math-inc/Sphere-Packing-Lean contains several files named Aux.lean.
#   "Aux" is a Windows reserved device name (like CON, NUL, PRN); git cannot
#   check out these files on Windows regardless of path-length or NTFS settings.
#   To use upstream SpherePacking on Windows, use WSL2. On Linux/macOS use:
#     [[require]]
#     name = "SpherePacking"
#     git = "https://github.com/math-inc/Sphere-Packing-Lean"
#     rev = "main"
#   A local Windows-safe fork branch has been prepared in
#   AgentTasks/external with exact Aux.lean files renamed to Auxiliary.lean.
#   See AgentTasks/sphere-packing-lean-windows-fork-2026-05-07.md.
#   The direct SPL bridge is exposed through the optional PhysicsSMSPL root.

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

# Direct require at the same version mathlib uses, but WITHOUT the
# errorOnBuild flag that mathlib sets. This overrides mathlib's
# configuration so Lake can build ProofWidgets from npm on Windows
# rather than failing with "ProofWidgets not up-to-date".
[[require]]
name = "proofwidgets"
scope = "leanprover-community"
rev = "v0.0.87"

# ============================================================
# Sphere-Packing-Lean dependency
# ============================================================
# The direct SPL import bridge in
# PhysicsSM/Draft/E8SpherePackingImported.lean is exposed through the optional
# PhysicsSMSPL root. The default PhysicsSM target remains SPL-free.
#
# WINDOWS: Do NOT point this block at upstream on Windows. SPL contains
# files named Aux.lean (Windows reserved device name). Lake cannot check out
# those files on Windows regardless of path length or NTFS settings. Use WSL2
# for upstream, or use the Windows-safe fork branch documented in
# AgentTasks/sphere-packing-lean-windows-fork-2026-05-07.md.
#
# SPL declarations confirmed available (Aristotle job SPL2, 2026-05-07):
#   Submodule.E8, E8Matrix, E8Matrix_unimodular, span_E8Matrix,
#   E8_integral_self, E8Lattice, E8Packing, E8Packing_density
#   Source: SpherePacking.Dim8.E8.Basic + SpherePacking.Dim8.E8.Packing
#   License: Apache-2.0
#
[[require]]
name = "SpherePacking"
path = "AgentTasks/external/Sphere-Packing-Lean-windows-safe"

# Upstream form for Linux/macOS or WSL2:
# [[require]]
# name = "SpherePacking"
# git = "https://github.com/math-inc/Sphere-Packing-Lean"
# rev = "main"
#
# Remote Windows-safe fork form (branch pushed 2026-05-07):
# [[require]]
# name = "SpherePacking"
# git = "https://github.com/Pandaemonium/Sphere-Packing-Lean"
# rev = "windows-safe-auxiliary-renames"

[[lean_lib]]
name = "PhysicsSM"
moreLeanArgs = ["-s65536"] # Heavy certified finite enumerations can overflow Lean's default stack.

[[lean_lib]]
name = "PhysicsSMDraft"
moreLeanArgs = ["-s65536"] # Keep draft Aristotle/SPL import chains on the same stack setting.

[[lean_lib]]
name = "PhysicsSMSPL"
moreLeanArgs = ["-s65536"] # Needed by Aristotle job 9215f082 for SPL theta bridge builds.

[[lean_lib]]
name = "CodeLatticeE8"
moreLeanArgs = ["-s65536"] # Clean Hamming-to-E8 publication package.

[[lean_lib]]
name = "CodeLatticeE8SPL"
moreLeanArgs = ["-s65536"] # Optional SPL-facing publication bridge.

[[lean_lib]]
name = "CodeLatticeE8Draft"
moreLeanArgs = ["-s65536"] # Draft/staging root for the publication extraction.
